name: Feature request
description: Suggest an idea for ChiroCard
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The user need or pain point — for whom, and when.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: privacy
    attributes:
      label: Does this require any data to leave the device?
      description: ChiroCard is local-first; new egress needs explicit review.
      options:
        - "No — fully local"
        - "Yes — it would need a network call"
        - "Not sure"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
