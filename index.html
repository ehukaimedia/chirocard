<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Analytics (Google Tag Manager) is loaded lazily and only after the user
       opts in — see src/utils/analytics.ts and src/lib/consent.ts. The container
       id comes from the VITE_GTM_ID build env, never hardcoded here. -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="canonical" href="https://chirocard.com/" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#242424" />
  <title>ChiroCard - Bodywork Journal & Digital Passport</title>
  <meta name="description"
    content="ChiroCard is your personal bodywork journal and digital passport. Track sessions with holistic practitioners, manage self-improvement goals, and keep your health history in your pocket." />
  <meta name="keywords"
    content="bodywork, journal, holistic practitioner, digital passport, self improvement, massage, chiropractor, wellness" />
  <meta name="author" content="ChiroCard" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://chirocard.com/" />
  <meta property="og:title" content="ChiroCard - Digital Body Work Passport" />
  <meta property="og:description"
    content="ChiroCard is your personal bodywork journal and digital passport. Track sessions with holistic practitioners, manage self-improvement goals, and keep your health history in your pocket." />
  <meta property="og:image" content="https://chirocard.com/chirocard-social.png" />

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://chirocard.com/" />
  <meta property="twitter:title" content="ChiroCard - Digital Body Work Passport" />
  <meta property="twitter:description"
    content="ChiroCard is your personal bodywork journal and digital passport. Track sessions with holistic practitioners, manage self-improvement goals, and keep your health history in your pocket." />
  <meta property="twitter:image" content="https://chirocard.com/chirocard-social.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
